version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: nft-auction-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nft_auction
      MYSQL_USER: nft
      MYSQL_PASSWORD: nftpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: